# nginx-instelling voor start.lab023.nl.
# Plaats dit als /etc/nginx/sites-available/start en activeer met een symlink
# naar sites-enabled. Stel daarna HTTPS in met Certbot.

server {
    listen 80;
    server_name start.lab023.nl;
    root /var/www/start;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
